#root{max-width:430px;margin:0 auto;min-height:100%;position:relative;z-index:1;}

/* ── Instagram-style nav (icons only) ── */

/* ── Instagram-style header ── */

.profile-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#8B0000,#FF0000);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;color:#fff;margin:0 auto 12px;}

/* ── Invite code display ── */

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── Empty state ── */
.empty{text-align:center;padding:60px 24px;}

select.auth-input{appearance:none;}
textarea.auth-input{resize:vertical;min-height:80px;}
</style>

<script>
// ── Storage ──
const S={
  get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  del:(k)=>{try{localStorage.removeItem(k);}catch{}}
};

const fmtCAD=(n)=>new Intl.NumberFormat('en-CA',{style:'currency',currency:'CAD',minimumFractionDigits:0}).format(n||0);
const fmtDate=(s)=>s?new Date(s+'T12:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric'}):'';

// ── Firebase ──
const FB={
apiKey:‘AIzaSyBRh-CGTPNYyRKKal87QRucG9pCp8cVDcM’,
projectId:‘pothole-6b684’,
authUrl:‘https://identitytoolkit.googleapis.com/v1’,
fsUrl:‘https://firestore.googleapis.com/v1/projects/pothole-6b684/databases/(default)/documents’,
};
const FBAuth={
async signUp(email,pass){const r=await fetch(`${FB.authUrl}/accounts:signUp?key=${FB.apiKey}`,{method:‘POST’,headers:{‘Content-Type’:‘application/json’},body:JSON.stringify({email,password:pass,returnSecureToken:true})});return r.json();},
async signIn(email,pass){const r=await fetch(`${FB.authUrl}/accounts:signInWithPassword?key=${FB.apiKey}`,{method:‘POST’,headers:{‘Content-Type’:‘application/json’},body:JSON.stringify({email,password:pass,returnSecureToken:true})});return r.json();},
async refresh(token){const r=await fetch(`https://securetoken.googleapis.com/v1/token?key=${FB.apiKey}`,{method:‘POST’,headers:{‘Content-Type’:‘application/json’},body:JSON.stringify({grant_type:‘refresh_token’,refresh_token:token})});return r.json();}
};
function toFS(obj){const f={};for(const[k,v]of Object.entries(obj)){if(v===null||v===undefined)f[k]={nullValue:null};else if(typeof v===‘boolean’)f[k]={booleanValue:v};else if(typeof v===‘number’)f[k]={doubleValue:v};else if(typeof v===‘string’)f[k]={stringValue:v};}return{fields:f};}
function fromFS(doc){if(!doc||!doc.fields)return null;const o={};for(const[k,v]of Object.entries(doc.fields)){if(‘stringValue’in v)o[k]=v.stringValue;else if(‘doubleValue’in v)o[k]=v.doubleValue;else if(‘integerValue’in v)o[k]=parseInt(v.integerValue);else if(‘booleanValue’in v)o[k]=v.booleanValue;else if(‘nullValue’in v)o[k]=null;}return o;}
const FBStore={
async getJobs(token,cid){try{const r=await fetch(`${FB.fsUrl}/companies/${cid}/jobs`,{headers:{Authorization:`Bearer ${token}`}});const d=await r.json();if(!d.documents)return[];return d.documents.map(doc=>({id:doc.name.split(’/’).pop(),…fromFS(doc)}));}catch{return[];}},
async setJob(token,cid,job){try{const{id,…data}=job;await fetch(`${FB.fsUrl}/companies/${cid}/jobs/${id}`,{method:‘PATCH’,headers:{Authorization:`Bearer ${token}`,‘Content-Type’:‘application/json’},body:JSON.stringify(toFS({…data,id}))});}catch{}},
async deleteJob(token,cid,jid){try{await fetch(`${FB.fsUrl}/companies/${cid}/jobs/${jid}`,{method:‘DELETE’,headers:{Authorization:`Bearer ${token}`}});}catch{}},
async getProfile(token,uid){try{const r=await fetch(`${FB.fsUrl}/users/${uid}`,{headers:{Authorization:`Bearer ${token}`}});return fromFS(await r.json());}catch{return null;}},
async setProfile(token,uid,data){try{await fetch(`${FB.fsUrl}/users/${uid}`,{method:‘PATCH’,headers:{Authorization:`Bearer ${token}`,‘Content-Type’:‘application/json’},body:JSON.stringify(toFS(data))});}catch{}},
};
async function syncDown(){const u=state.user;if(!u||u.isGuest||!u.idToken)return;const jobs=await FBStore.getJobs(u.idToken,u.companyId||u.id);if(jobs.length>0){state.jobs=jobs;S.set(‘pr_jobs’,jobs);render();}}
async function pushJob(job){const u=state.user;if(!u||u.isGuest||!u.idToken)return;await FBStore.setJob(u.idToken,u.companyId||u.id,job);}
async function removeJob(id){const u=state.user;if(!u||u.isGuest||!u.idToken)return;await FBStore.deleteJob(u.idToken,u.companyId||u.id,id);}

// ── State ──
let state={screen:‘welcome’,user:null,tab:‘home’,jobs:[],error:’’,syncing:false};

// ── Status config ──
const ST={
pending:{label:‘Pending’,color:’#3B82F6’,bg:‘rgba(59,130,246,0.15)’},
active:{label:‘Active’,color:’#3B82F6’,bg:‘rgba(59,130,246,0.15)’},
done:{label:‘Done’,color:’#22C55E’,bg:‘rgba(34,197,94,0.15)’},
invoiced:{label:‘Invoiced’,color:’#FF0000’,bg:‘rgba(255,0,0,0.12)’},
paid:{label:‘Paid’,color:’#22C55E’,bg:‘rgba(34,197,94,0.15)’},
};

// ── DOM helper ──
function h(tag,props,…children){
const el=document.createElement(tag);
if(props)Object.entries(props).forEach(([k,v])=>{
if(k===‘className’)el.className=v;
else if(k===‘style’)Object.assign(el.style,v);
else if(k.startsWith(‘on’))el.addEventListener(k.slice(2).toLowerCase(),v);
else el.setAttribute(k,v);
});
children.flat(Infinity).forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c===‘string’||typeof c===‘number’?document.createTextNode(c):c);});
return el;
}
function setState(u){Object.assign(state,u);render();}

{id:uid(),title:‘King St Pothole Repair’,client:‘City of Toronto’,location:‘King St W & Spadina’,price:2400,cost:1200,status:‘paid’,date:‘2025-04-01’,notes:‘8 potholes patched, cold patch asphalt’},
{id:uid(),title:‘Scarborough Mall Lot’,client:‘Bentley Properties’,location:‘200 Town Centre Ct’,price:5800,cost:2900,status:‘active’,date:today(),notes:‘22 patches needed across lot B and C’},
{id:uid(),title:‘Residential — Oak Ave’,client:‘Linda Walsh’,location:‘88 Oak Ave, Etobicoke’,price:480,cost:240,status:‘pending’,date:today(),notes:‘Single driveway pothole near garage’},
{id:uid(),title:‘Hwy 401 Emergency’,client:‘MTO Ontario’,location:‘Hwy 401 W, km 284’,price:3200,cost:1600,status:‘invoiced’,date:‘2025-04-03’,notes:‘Emergency overnight repair’},
];}

function WelcomeScreen(){
return h(‘div’,{className:‘fade-up’,style:{minHeight:‘100vh’,display:‘flex’,flexDirection:‘column’,background:‘transparent’,padding:‘0 24px’,position:‘relative’,zIndex:1}},

function SignUpScreen(){
let name=’’,email=’’,pass=’’,company=’’;
const go=async()=>{
if(!name.trim())return setState({error:‘Enter your name.’});
if(!email.includes(’@’))return setState({error:‘Enter a valid email.’});
if(pass.length<6)return setState({error:‘Password must be 6+ characters.’});
if(!company.trim())return setState({error:‘Enter your company name.’});
setState({error:’’,syncing:true});
try{
const res=await FBAuth.signUp(email,pass);
if(res.error){const m=res.error.message||’’;if(m.includes(‘EMAIL_EXISTS’))return setState({error:‘Email already exists. Sign in.’,syncing:false});return setState({error:m,syncing:false});}
const user={id:res.localId,name,email,company,companyId:res.localId,role:‘owner’,isGuest:false,idToken:res.idToken,refreshToken:res.refreshToken};
await FBStore.setProfile(res.idToken,res.localId,{name,email,company,companyId:res.localId,role:‘owner’});
S.set(‘pr_session’,user);S.set(‘pr_user_’+email,{email,pass,name,company,companyId:res.localId,role:‘owner’});
state.jobs=makeDemoData();for(const j of state.jobs)await FBStore.setJob(res.idToken,res.localId,j);S.set(‘pr_jobs’,state.jobs);
setState({screen:‘app’,user,tab:‘home’,error:’’,syncing:false});
}catch{
const user={id:uid(),name,email,company,companyId:uid(),role:‘owner’,isGuest:false,idToken:null};

// ════════════════════════════════════════════════
// APP SHELL
// ════════════════════════════════════════════════
function AppShell(){
const isWorker=(state.user&&state.user.role)===‘worker’;
const TABS=isWorker?[
{id:‘home’,icon:‘🏠’},
{id:‘calendar’,icon:‘📅’},
{id:‘profile’,icon:‘👤’},
]:[
{id:‘home’,icon:‘🏠’},
{id:‘calendar’,icon:‘📅’},
{id:‘dashboard’,icon:‘📊’},
{id:‘profile’,icon:‘👤’},
];
return h(‘div’,{},
state.tab===‘home’?FeedScreen():
state.tab===‘calendar’?CalendarScreen():
state.tab===‘dashboard’?DashScreen():ProfileScreen(),
h(‘nav’,{className:‘ig-nav’},
…TABS.map(t=>{
const active=state.tab===t.id;
return h(‘button’,{className:‘ig-nav-btn’,onClick:()=>{window._openJobId=null;setState({tab:t.id,error:’’});}},
h(‘span’,{className:‘ig-nav-icon’,style:{filter:active?‘none’:‘grayscale(1) brightness(0.4)’}},t.icon)
);
})
)
);
}

// ════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════
function render(){
const root=document.getElementById(‘root’);root.innerHTML=’’;
let el;
if(state.screen===‘welcome’)el=WelcomeScreen();
else if(state.screen===‘signup’)el=SignUpScreen();
else if(state.screen===‘signin’)el=SignInScreen();
else if(state.screen===‘invite’)el=InviteScreen();
else el=AppShell();
root.appendChild(el);
}

// ── Boot ──
window.onerror=function(msg,src,line,col,err){
document.getElementById(‘root’).innerHTML=
‘<div style="padding:40px 20px;font-family:monospace;background:#000;min-height:100vh;color:#fff">’+
‘<div style="color:#FF0000;font-size:16px;font-weight:700;margin-bottom:16px">Error on line ‘+line+’:</div>’+
‘<div style="font-size:14px;color:#ff6666;margin-bottom:12px">’+msg+’</div>’+
‘<div style="font-size:11px;color:#444">’+src+’</div>’+
‘</div>’;
return true;
};

async function boot(){
// Apply saved theme
const savedTheme=S.get(‘pr_theme’,‘night’);
if(savedTheme===‘day’){document.body.classList.add(‘day’);window._isDay=true;}
else{window._isDay=false;}
const s=S.get(‘pr_session’);
if(s){
state.user=s;state.jobs=S.get(‘pr_jobs’,null)||makeDemoData();state.screen=‘app’;state.tab=‘home’;render();
if(s.refreshToken){
try{
const res=await FBAuth.refresh(s.refreshToken);
if(res.id_token){state.user={…s,idToken:res.id_token,refreshToken:res.refresh_token};S.set(‘pr_session’,state.user);await syncDown();if(window._syncTimer)clearInterval(window._syncTimer);window._syncTimer=setInterval(syncDown,15000);}
}catch{}
}
}else{render();}
}
boot();
</script>
