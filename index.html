<title>Premium.Repairs</title>
<style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;color:#FFF;overflow-x:hidden;}body{background:#000;}body.day{background:#F5F5F5;}body.day::before{display:none;background:radial-gradient(ellipse at 15% 15%,rgba(180,140,255,0.35) 0%,transparent 50%),radial-gradient(ellipse at 85% 10%,rgba(255,160,80,0.4) 0%,transparent 45%),radial-gradient(ellipse at 75% 85%,rgba(100,160,255,0.35) 0%,transparent 50%),radial-gradient(ellipse at 10% 85%,rgba(220,100,240,0.3) 0%,transparent 50%),linear-gradient(135deg,#e8e0f8 0%,#f5f0ff 50%,#e8f0ff 100%);}body.day .ig-header{background:rgba(240,235,255,0.8)!important;border-bottom:1px solid rgba(0,0,0,0.06)!important;}body.day .ig-nav{background:rgba(240,235,255,0.85)!important;border-top:1px solid rgba(0,0,0,0.06)!important;}body.day .post{border-bottom:1px solid rgba(0,0,0,0.06)!important;}body.day .post-body{background:rgba(255,255,255,0.6)!important;border:1px solid rgba(0,0,0,0.07)!important;}body.day .stat-card{background:rgba(255,255,255,0.6)!important;border:1px solid rgba(0,0,0,0.07)!important;}body.day .auth-input{background:rgba(255,255,255,0.7)!important;border:1.5px solid rgba(0,0,0,0.1)!important;color:#111!important;}body.day .auth-input::placeholder{color:rgba(0,0,0,0.3)!important;}body.day .auth-label{color:rgba(0,0,0,0.45)!important;}body.day .auth-back{color:rgba(0,0,0,0.4)!important;}body.day .auth-sub{color:rgba(0,0,0,0.4)!important;}body.day .auth-btn-ghost{color:rgba(0,0,0,0.3)!important;}body.day .auth-btn-sec{background:rgba(255,255,255,0.5)!important;border:1.5px solid rgba(0,0,0,0.1)!important;color:rgba(0,0,0,0.6)!important;}body.day .auth-wrap{color:#111!important;}body.day .auth-title{color:#111!important;}body.day .sheet{background:rgba(245,240,255,0.95)!important;}body.day .post-name{color:#111!important;}body.day .post-sub{color:rgba(0,0,0,0.4)!important;}body.day .post-location{color:rgba(0,0,0,0.4)!important;}body.day .post-notes{color:rgba(0,0,0,0.4)!important;}body.day .post-profit{color:#059669!important;}body.day .ig-logo{color:#111!important;}body.day .stat-num{filter:none!important;}body.day .stat-label{color:rgba(0,0,0,0.4)!important;}body.day .story-inner{background:rgba(255,255,255,0.6)!important;border:2.5px solid rgba(255,255,255,0.8)!important;}body.day .story-label{color:rgba(0,0,0,0.5)!important;}body.day .post-action-btn{border:1.5px solid rgba(0,0,0,0.1)!important;color:rgba(0,0,0,0.4)!important;background:rgba(255,255,255,0.4)!important;}body.day .empty-sub{color:rgba(0,0,0,0.35)!important;}body.day .invite-code-box{background:rgba(255,255,255,0.6)!important;color:#111!important;}#root{max-width:430px;margin:0 auto;min-height:100%;position:relative;z-index:1;}.ig-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#000;border-top:1px solid #111;display:flex;padding:10px 0 32px;z-index:100;}.ig-nav-btn{flex:1;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:8px 0;}.ig-nav-icon{font-size:26px;line-height:1;transition:transform 0.15s;}.ig-nav-btn:active .ig-nav-icon{transform:scale(0.88);}.ig-header{background:#000;border-bottom:1px solid #111;padding:48px 16px 12px;position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;}.ig-logo{font-size:22px;font-weight:900;letter-spacing:-0.03em;}.ig-logo span{color:#FF0000;}.stories-row{display:flex;gap:14px;padding:14px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;border-bottom:1px solid #1A1A1A;}.stories-row::-webkit-scrollbar{display:none;}.story-item{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;cursor:pointer;}.story-ring{width:64px;height:64px;border-radius:50%;padding:2.5px;background:linear-gradient(45deg,#8B0000,#CC0000,#FF0000,#F77737,#FCAF45);}.story-ring.grey{background:#333;}.story-inner{width:100%;height:100%;border-radius:50%;border:2.5px solid #000;background:#0A0A0A;display:flex;align-items:center;justify-content:center;font-size:26px;}.story-label{font-size:11px;color:rgba(255,255,255,0.4);font-weight:500;text-align:center;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}.story-count{font-size:12px;font-weight:700;color:#FFF;}.feed{padding-bottom:100px;}.post{border-bottom:1px solid #111;padding:14px 16px;}.post-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}.post-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(45deg,#8B0000,#CC0000,#FF0000,#F77737,#FCAF45);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;}.post-meta{flex:1;min-width:0;}.post-name{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}.post-sub{font-size:12px;color:rgba(255,255,255,0.4);}.post-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:0.04em;text-transform:uppercase;flex-shrink:0;}.post-body{background:#000;border:1px solid #1A1A1A;border-radius:14px;padding:16px;margin-bottom:12px;}.post-price{font-size:32px;font-weight:900;letter-spacing:-0.03em;color:#FFFFFF;line-height:1;margin-bottom:4px;}.post-profit{font-size:13px;color:#10B981;font-weight:600;}.post-location{font-size:13px;color:rgba(255,255,255,0.35);margin-top:8px;}.post-notes{font-size:13px;color:rgba(255,255,255,0.3);font-style:italic;margin-top:6px;line-height:1.5;}.post-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}.post-action-btn{padding:7px 14px;border-radius:20px;border:1.5px solid #222;background:transparent;color:#666;font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:0.04em;}.post-action-btn.active{border-color:#FF0000;color:#FF0000;background:rgba(255,0,0,0.08);}.post-action-btn.done{border-color:#10B981;color:#10B981;background:rgba(16,185,129,0.08);}.post-action-btn.del{border-color:#333;color:#555;}.new-post-btn{position:fixed;right:20px;bottom:90px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#8B0000,#FF0000,#F77737);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 24px rgba(255,0,0,0.4);z-index:90;}.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:flex-end;}.sheet{background:#000;border:1px solid #1A1A1A;border-radius:20px 20px 0 0;width:100%;max-width:430px;margin:0 auto;padding:20px 20px 50px;max-height:90vh;overflow-y:auto;}.sheet-bar{width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 24px;}.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px;}.stat-card{background:#000;border:1px solid #1A1A1A;border-radius:16px;padding:16px;}.stat-num{font-size:30px;font-weight:900;letter-spacing:-0.03em;line-height:1;margin-bottom:4px;}.stat-label{font-size:12px;color:rgba(255,255,255,0.35);font-weight:500;}.auth-wrap{min-height:100vh;display:flex;flex-direction:column;padding:0 24px;background:transparent;position:relative;z-index:1;}.auth-back{background:none;border:none;color:rgba(255,255,255,0.4);font-size:15px;cursor:pointer;padding:0;margin-bottom:32px;display:flex;align-items:center;gap:6px;}.auth-title{font-size:28px;font-weight:800;letter-spacing:-0.03em;color:#FFF;margin-bottom:6px;}.auth-sub{font-size:15px;color:rgba(255,255,255,0.35);margin-bottom:32px;}.auth-field{margin-bottom:14px;}.auth-label{display:block;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:8px;}.auth-input{width:100%;padding:15px 16px;background:#0A0A0A;border:1.5px solid #1A1A1A;border-radius:12px;color:#FFF;font-size:16px;outline:none;font-family:inherit;transition:border-color 0.2s;}.auth-input:focus{border-color:#FF0000;background:#0A0A0A;}.auth-input::placeholder{color:#444;}.auth-btn{width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#8B0000,#FF0000,#F77737);color:#FFF;margin-top:8px;box-shadow:0 4px 20px rgba(255,0,0,0.35);}.auth-btn-sec{width:100%;padding:15px;border:1.5px solid #222;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;background:#0A0A0A;color:#888;margin-top:8px;}.auth-btn-ghost{background:none;border:none;color:rgba(255,255,255,0.25);font-size:13px;cursor:pointer;padding:12px;}.auth-err{background:rgba(255,59,48,0.1);border:1px solid rgba(255,59,48,0.2);border-radius:10px;padding:12px 14px;font-size:13px;color:#FF6B6B;margin-bottom:14px;}.auth-invite-btn{width:100%;padding:15px;border:1.5px solid rgba(255,0,0,0.3);border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;background:rgba(255,0,0,0.08);color:#FF0000;margin-top:8px;}.profile-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#8B0000,#FF0000);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;color:#fff;margin:0 auto 12px;}.invite-code-box{font-size:38px;font-weight:900;letter-spacing:0.18em;background:#000;border:1px solid #1A1A1A;border-radius:14px;padding:18px;text-align:center;margin:12px 0;}@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}@keyframes fadeIn{from{opacity:0}to{opacity:1}}.fade-up{animation:fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) both;}.fade-in{animation:fadeIn 0.25s ease both;}.scroll-content{padding-bottom:100px;}.empty{text-align:center;padding:60px 24px;}.empty-icon{font-size:48px;margin-bottom:16px;}.empty-title{font-size:18px;font-weight:700;margin-bottom:8px;}.empty-sub{font-size:14px;color:rgba(255,255,255,0.3);}select.auth-input{appearance:none;}textarea.auth-input{resize:vertical;min-height:80px;}</style>
