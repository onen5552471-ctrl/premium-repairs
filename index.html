<title>Premium.Repairs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;color:#FFF;overflow-x:hidden;}
body{background:#000;}

/* ── Day mode ── */
body.day{background:#F5F5F5;}
body.day::before{display:none;background:
radial-gradient(ellipse at 15% 15%,rgba(180,140,255,0.35) 0%,transparent 50%),
radial-gradient(ellipse at 85% 10%,rgba(255,160,80,0.4) 0%,transparent 45%),
radial-gradient(ellipse at 75% 85%,rgba(100,160,255,0.35) 0%,transparent 50%),
radial-gradient(ellipse at 10% 85%,rgba(220,100,240,0.3) 0%,transparent 50%),
linear-gradient(135deg,#e8e0f8 0%,#f5f0ff 50%,#e8f0ff 100%);}
body.day .ig-header{background:rgba(240,235,255,0.8)!important;border-bottom:1px solid rgba(0,0,0,0.06)!important;}
body.day .ig-nav{background:rgba(240,235,255,0.85)!important;border-top:1px solid rgba(0,0,0,0.06)!important;}

body.day .post-body{background:rgba(255,255,255,0.6)!important;border:1px solid rgba(0,0,0,0.07)!important;}
body.day .stat-card{background:rgba(255,255,255,0.6)!important;border:1px solid rgba(0,0,0,0.07)!important;}
body.day .auth-input{background:rgba(255,255,255,0.7)!important;border:1.5px solid rgba(0,0,0,0.1)!important;color:#111!important;}

body.day .auth-label{color:rgba(0,0,0,0.45)!important;}
body.day .auth-back{color:rgba(0,0,0,0.4)!important;}
body.day .auth-sub{color:rgba(0,0,0,0.4)!important;}
body.day .auth-btn-ghost{color:rgba(0,0,0,0.3)!important;}
body.day .auth-btn-sec{background:rgba(255,255,255,0.5)!important;border:1.5px solid rgba(0,0,0,0.1)!important;color:rgba(0,0,0,0.6)!important;}
body.day .auth-wrap{color:#111!important;}
body.day .auth-title{color:#111!important;}
body.day .sheet{background:rgba(245,240,255,0.95)!important;}
body.day .post-name{color:#111!important;}
body.day .post-sub{color:rgba(0,0,0,0.4)!important;}
body.day .post-location{color:rgba(0,0,0,0.4)!important;}
body.day .post-notes{color:rgba(0,0,0,0.4)!important;}
body.day .post-profit{color:#059669!important;}
body.day .ig-logo{color:#111!important;}
body.day .stat-num{filter:none!important;}
body.day .stat-label{color:rgba(0,0,0,0.4)!important;}
body.day .story-inner{background:rgba(255,255,255,0.6)!important;border:2.5px solid rgba(255,255,255,0.8)!important;}
body.day .story-label{color:rgba(0,0,0,0.5)!important;}
body.day .post-action-btn{border:1.5px solid rgba(0,0,0,0.1)!important;color:rgba(0,0,0,0.4)!important;background:rgba(255,255,255,0.4)!important;}
body.day .empty-sub{color:rgba(0,0,0,0.35)!important;}
body.day .invite-code-box{background:rgba(255,255,255,0.6)!important;color:#111!important;}
#root{max-width:430px;margin:0 auto;min-height:100%;position:relative;z-index:1;}

/* ── Instagram-style nav (icons only) ── */
.ig-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#000;border-top:1px solid #111;display:flex;padding:10px 0 32px;z-index:100;}
.ig-nav-btn{flex:1;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:8px 0;}
.ig-nav-icon{font-size:26px;line-height:1;transition:transform 0.15s;}
.ig-nav-btn:active .ig-nav-icon{transform:scale(0.88);}

/* ── Instagram-style header ── */
.ig-header{background:#000;border-bottom:1px solid #111;padding:48px 16px 12px;position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;}
.ig-logo{font-size:22px;font-weight:900;letter-spacing:-0.03em;}
.ig-logo span{color:#FF0000;}

/* ── Stories row ── */
.stories-row{display:flex;gap:14px;padding:14px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;border-bottom:1px solid #1A1A1A;}
.stories-row::-webkit-scrollbar{display:none;}
.story-item{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;cursor:pointer;}
.story-ring{width:64px;height:64px;border-radius:50%;padding:2.5px;background:linear-gradient(45deg,#8B0000,#CC0000,#FF0000,#F77737,#FCAF45);}
.story-ring.grey{background:#333;}
.story-inner{width:100%;height:100%;border-radius:50%;border:2.5px solid #000;background:#0A0A0A;display:flex;align-items:center;justify-content:center;font-size:26px;}
.story-label{font-size:11px;color:rgba(255,255,255,0.4);font-weight:500;text-align:center;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.story-count{font-size:12px;font-weight:700;color:#FFF;}

/* ── Feed posts ── */
.feed{padding-bottom:100px;}
.post{border-bottom:1px solid #111;padding:14px 16px;}
.post-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.post-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(45deg,#8B0000,#CC0000,#FF0000,#F77737,#FCAF45);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;}
.post-meta{flex:1;min-width:0;}
.post-name{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.post-sub{font-size:12px;color:rgba(255,255,255,0.4);}
.post-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:0.04em;text-transform:uppercase;flex-shrink:0;}
.post-body{background:#000;border:1px solid #1A1A1A;border-radius:14px;padding:16px;margin-bottom:12px;}
.post-price{font-size:32px;font-weight:900;letter-spacing:-0.03em;color:#FFFFFF;line-height:1;margin-bottom:4px;}
.post-profit{font-size:13px;color:#10B981;font-weight:600;}
.post-location{font-size:13px;color:rgba(255,255,255,0.35);margin-top:8px;}
.post-notes{font-size:13px;color:rgba(255,255,255,0.3);font-style:italic;margin-top:6px;line-height:1.5;}
.post-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.post-action-btn{padding:7px 14px;border-radius:20px;border:1.5px solid #222;background:transparent;color:#666;font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:0.04em;}
.post-action-btn.active{border-color:#FF0000;color:#FF0000;background:rgba(255,0,0,0.08);}
.post-action-btn.done{border-color:#10B981;color:#10B981;background:rgba(16,185,129,0.08);}
.post-action-btn.del{border-color:#333;color:#555;}

/* ── New post button ── */
.new-post-btn{position:fixed;right:20px;bottom:90px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#8B0000,#FF0000,#F77737);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 24px rgba(255,0,0,0.4);z-index:90;}

/* ── Sheet ── */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:flex-end;}
.sheet{background:#000;border:1px solid #1A1A1A;border-radius:20px 20px 0 0;width:100%;max-width:430px;margin:0 auto;padding:20px 20px 50px;max-height:90vh;overflow-y:auto;}
.sheet-bar{width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 24px;}

/* ── Cards for dashboard ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px;}
.stat-card{background:#000;border:1px solid #1A1A1A;border-radius:16px;padding:16px;}
.stat-num{font-size:30px;font-weight:900;letter-spacing:-0.03em;line-height:1;margin-bottom:4px;}
.stat-label{font-size:12px;color:rgba(255,255,255,0.35);font-weight:500;}

/* ── Auth screens ── */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;padding:0 24px;background:transparent;position:relative;z-index:1;}
.auth-back{background:none;border:none;color:rgba(255,255,255,0.4);font-size:15px;cursor:pointer;padding:0;margin-bottom:32px;display:flex;align-items:center;gap:6px;}
.auth-title{font-size:28px;font-weight:800;letter-spacing:-0.03em;color:#FFF;margin-bottom:6px;}
.auth-sub{font-size:15px;color:rgba(255,255,255,0.35);margin-bottom:32px;}
.auth-field{margin-bottom:14px;}
.auth-label{display:block;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:8px;}
.auth-input{width:100%;padding:15px 16px;background:#0A0A0A;border:1.5px solid #1A1A1A;border-radius:12px;color:#FFF;font-size:16px;outline:none;font-family:inherit;transition:border-color 0.2s;}
.auth-input:focus{border-color:#FF0000;background:#0A0A0A;}
.auth-input::placeholder{color:#444;}
.auth-btn{width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#8B0000,#FF0000,#F77737);color:#FFF;margin-top:8px;box-shadow:0 4px 20px rgba(255,0,0,0.35);}
.auth-btn-sec{width:100%;padding:15px;border:1.5px solid #222;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;background:#0A0A0A;color:#888;margin-top:8px;}
.auth-btn-ghost{background:none;border:none;color:rgba(255,255,255,0.25);font-size:13px;cursor:pointer;padding:12px;}
.auth-err{background:rgba(255,59,48,0.1);border:1px solid rgba(255,59,48,0.2);border-radius:10px;padding:12px 14px;font-size:13px;color:#FF6B6B;margin-bottom:14px;}
.auth-invite-btn{width:100%;padding:15px;border:1.5px solid rgba(255,0,0,0.3);border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;background:rgba(255,0,0,0.08);color:#FF0000;margin-top:8px;}

/* ── Profile ── */
.profile-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#8B0000,#FF0000);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;color:#fff;margin:0 auto 12px;}

/* ── Invite code display ── */
.invite-code-box{font-size:38px;font-weight:900;letter-spacing:0.18em;background:#000;border:1px solid #1A1A1A;border-radius:14px;padding:18px;text-align:center;margin:12px 0;}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade-up{animation:fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) both;}
.fade-in{animation:fadeIn 0.25s ease both;}

/* ── Scroll content ── */
.scroll-content{padding-bottom:100px;}

/* ── Empty state ── */
.empty{text-align:center;padding:60px 24px;}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-title{font-size:18px;font-weight:700;margin-bottom:8px;}
.empty-sub{font-size:14px;color:rgba(255,255,255,0.3);}

select.auth-input{appearance:none;}
textarea.auth-input{resize:vertical;min-height:80px;}
</style>

</head>
<body>
<div id="root"></div>
<script>
// ── Storage ──
const S={
  get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  del:(k)=>{try{localStorage.removeItem(k);}catch{}}
};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const today=()=>new Date().toISOString().slice(0,10);
const fmtCAD=(n)=>new Intl.NumberFormat('en-CA',{style:'currency',currency:'CAD',minimumFractionDigits:0}).format(n||0);
const fmtDate=(s)=>s?new Date(s+'T12:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric'}):'';

// ── Firebase ──
const FB={
apiKey:‘AIzaSyBRh-CGTPNYyRKKal87QRucG9pCp8cVDcM’,
projectId:‘pothole-6b684’,
authUrl:‘https://identitytoolkit.googleapis.com/v1’,
fsUrl:‘https://firestore.googleapis.com/v1/projects/pothole-6b684/databases/(default)/documents’,
};
const FBAuth={
async signUp(email,pass){const r=await fetch(`${FB.authUrl}/accounts:signUp?key=${FB.apiKey}`,{method:‘POST’,headers:{‘Content-Type’:‘application/json’},body:JSON.stringify({email,password:pass,returnSecureToken:true})});return r.json();},
async signIn(email,pass){const r=await fetch(`${FB.authUrl}/accounts:signInWithPassword?key=${FB.apiKey}`,{method:‘POST’,headers:{‘Content-Type’:‘application/json’},body:JSON.stringify({email,password:pass,returnSecureToken:true})});return r.json();},
async refresh(token){const r=await fetch(`https://securetoken.googleapis.com/v1/token?key=${FB.apiKey}`,{method:‘POST’,headers:{‘Content-Type’:‘application/json’},body:JSON.stringify({grant_type:‘refresh_token’,refresh_token:token})});return r.json();}
};
function toFS(obj){var f={};Object.keys(obj).forEach(function(k){var v=obj[k];if(v===null||v===undefined)f[k]={nullValue:null};else if(typeof v===‘boolean’)f[k]={booleanValue:v};else if(typeof v===‘number’)f[k]={doubleValue:v};else if(typeof v===‘string’)f[k]={stringValue:v};});return{fields:f};}
function fromFS(doc){if(!doc||!doc.fields)return null;var o={};Object.keys(doc.fields).forEach(function(k){var v=doc.fields[k];if(‘stringValue’in v)o[k]=v.stringValue;else if(‘doubleValue’in v)o[k]=v.doubleValue;else if(‘integerValue’in v)o[k]=parseInt(v.integerValue);else if(‘booleanValue’in v)o[k]=v.booleanValue;else if(‘nullValue’in v)o[k]=null;});return o;}
const FBStore={
async getJobs(token,cid){
try{
const headers=token?{Authorization:‘Bearer ‘+token}:{};
const r=await fetch(FB.fsUrl+’/companies/’+cid+’/jobs’,{headers:headers});
const d=await r.json();
if(!d.documents)return[];
return d.documents.map(function(doc){return Object.assign({id:doc.name.split(’/’).pop()},fromFS(doc));});
}catch(e){return[];}
},
async setJob(token,cid,job){try{const{id,…data}=job;await fetch(`${FB.fsUrl}/companies/${cid}/jobs/${id}`,{method:‘PATCH’,headers:{Authorization:`Bearer ${token}`,‘Content-Type’:‘application/json’},body:JSON.stringify(toFS({…data,id}))});}catch{}},
async deleteJob(token,cid,jid){try{await fetch(`${FB.fsUrl}/companies/${cid}/jobs/${jid}`,{method:‘DELETE’,headers:{Authorization:`Bearer ${token}`}});}catch{}},
async getProfile(token,uid){try{const r=await fetch(`${FB.fsUrl}/users/${uid}`,{headers:{Authorization:`Bearer ${token}`}});return fromFS(await r.json());}catch{return null;}},
async setProfile(token,uid,data){try{await fetch(`${FB.fsUrl}/users/${uid}`,{method:‘PATCH’,headers:{Authorization:`Bearer ${token}`,‘Content-Type’:‘application/json’},body:JSON.stringify(toFS(data))});}catch{}},
};
// ── Chat Firebase helpers ──
async function sendMessage(chatId,msg){
const u=state.user;
if(!u||!u.idToken)return;
const cid=getActiveCompanyId();
const msgId=uid();
const data={id:msgId,chatId:chatId,senderId:u.id,senderName:u.name||‘User’,text:msg,ts:Date.now()};
try{
await fetch(FB.fsUrl+’/companies/’+cid+’/chats/’+chatId+’/messages/’+msgId,{
method:‘PATCH’,
headers:{Authorization:‘Bearer ‘+u.idToken,‘Content-Type’:‘application/json’},
body:JSON.stringify(toFS(data))
});
}catch(e){}
return data;
}
async function getMessages(chatId){
const u=state.user;
const cid=getActiveCompanyId();
try{
var headers=u&&u.idToken?{Authorization:‘Bearer ‘+u.idToken}:{};
const r=await fetch(FB.fsUrl+’/companies/’+cid+’/chats/’+chatId+’/messages?pageSize=100’,{headers:headers});
const d=await r.json();
if(!d.documents)return[];
return d.documents.map(function(doc){return Object.assign({id:doc.name.split(’/’).pop()},fromFS(doc));})
.sort(function(a,b){return (a.ts||0)-(b.ts||0);});
}catch(e){return[];}
}
async function saveChat(chat){
const u=state.user;
if(!u||!u.idToken)return;
const cid=getActiveCompanyId();
try{
await fetch(FB.fsUrl+’/companies/’+cid+’/chats/’+chat.id,{
method:‘PATCH’,
headers:{Authorization:‘Bearer ‘+u.idToken,‘Content-Type’:‘application/json’},
body:JSON.stringify(toFS({id:chat.id,name:chat.name,members:JSON.stringify(chat.members),createdBy:u.id,created:today()}))
});
}catch(e){}
}
async function getChats(){
const u=state.user;
const cid=getActiveCompanyId();
try{
var headers=u&&u.idToken?{Authorization:‘Bearer ‘+u.idToken}:{};
const r=await fetch(FB.fsUrl+’/companies/’+cid+’/chats’,{headers:headers});
const d=await r.json();
if(!d.documents)return[];
return d.documents.map(function(doc){
var obj=Object.assign({id:doc.name.split(’/’).pop()},fromFS(doc));
try{obj.members=JSON.parse(obj.members||’[]’);}catch(e){obj.members=[];}
return obj;
});
}catch(e){return[];}
}

// ── Company helpers ──
function getActiveCompanyId(){
const u=state.user;
if(!u)return null;
return state.activeCompanyId||u.companyId||u.ownerId||u.id;
}

async function loadCompanies(){
const u=state.user;
if(!u||u.isGuest)return;
// companies stored locally keyed to user
const saved=S.get(‘pr_companies_’+u.id,[]);
// Always ensure current company is in list
const currentCid=u.companyId||u.id;
const existing=saved.find(function(c){return c.id===currentCid;});
if(!existing){
saved.unshift({id:currentCid,name:u.company||‘My Company’,ownerId:u.id,created:today()});
S.set(‘pr_companies_’+u.id,saved);
}
state.companies=saved;
if(!state.activeCompanyId)state.activeCompanyId=currentCid;
}

async function switchCompany(cid){
const u=state.user;
if(!u||!u.idToken)return;
state.activeCompanyId=cid;
S.set(‘pr_active_company_’+u.id,cid);
state.jobs=S.get(‘pr_jobs_’+cid,[])||[];
render();
// Load jobs from Firebase for this company
const jobs=await FBStore.getJobs(u.idToken,cid);
if(jobs.length>0){state.jobs=jobs;S.set(‘pr_jobs_’+cid,jobs);render();}
}

async function createCompany(name){
const u=state.user;
if(!u)return;
const newCid=uid();
const company={id:newCid,name:name,ownerId:u.id,created:today()};
const updated=[…state.companies,company];
state.companies=updated;
S.set(‘pr_companies_’+u.id,updated);
await switchCompany(newCid);
}

async function syncDown(){
const u=state.user;
if(!u||u.isGuest)return;
const cid=getActiveCompanyId();
try{
const jobs=await FBStore.getJobs(u.idToken||’’,cid);
if(jobs.length>0){
checkForJobUpdates(jobs);
state.jobs=jobs;S.set(‘pr_jobs_’+cid,jobs);render();
}
}catch(e){}
}
async function pushJob(job){const u=state.user;if(!u||u.isGuest||!u.idToken)return;const cid=getActiveCompanyId();await FBStore.setJob(u.idToken,cid,job);}
async function removeJob(id){const u=state.user;if(!u||u.isGuest||!u.idToken)return;const cid=getActiveCompanyId();await FBStore.deleteJob(u.idToken,cid,id);}

// ── State ──
let state={screen:‘welcome’,user:null,tab:‘home’,jobs:[],companies:[],activeCompanyId:null,chats:[],messages:{},error:’’,syncing:false};

// ── Notifications ──
async function requestNotifPermission(){
if(!(‘Notification’ in window))return;
if(Notification.permission===‘default’){
await Notification.requestPermission();
}
}

function showNotif(title,body,icon){
if(!(‘Notification’ in window)||Notification.permission!==‘granted’)return;
try{
if(navigator.serviceWorker&&navigator.serviceWorker.controller){
navigator.serviceWorker.ready.then(function(reg){
reg.showNotification(title,{body:body,icon:icon||’/icon.png’,badge:’/icon.png’,vibrate:[200,100,200],tag:‘pr-notif’});
});
} else {
new Notification(title,{body:body,icon:icon||’/icon.png’});
}
}catch(e){}
}

// Track what we’ve already notified about
var _notifiedMsgs={};
var _notifiedJobs={};

function checkForNewMessages(chatId,newMsgs){
var u=state.user;if(!u)return;
newMsgs.forEach(function(msg){
if(msg.senderId===u.id)return; // don’t notify own messages
if(_notifiedMsgs[msg.id])return;
_notifiedMsgs[msg.id]=true;
showNotif(msg.senderName||‘New message’,’In ‘+((state.chats||[]).find(function(c){return c.id===chatId;})||{name:‘crew chat’}).name+’: ’+msg.text);
});
}

function checkForJobUpdates(newJobs){
var u=state.user;if(!u)return;
newJobs.forEach(function(job){
var prev=_notifiedJobs[job.id];
if(prev&&prev!==job.status){
showNotif(‘Job Updated’,job.title+’ is now ’+job.status.toUpperCase());
}
_notifiedJobs[job.id]=job.status;
});
}

// ── Status config ──
const ST={
pending:{label:‘Pending’,color:’#3B82F6’,bg:‘rgba(59,130,246,0.15)’},

// ── DOM helper ──
function h(tag,props,…children){
const el=document.createElement(tag);
if(props)Object.entries(props).forEach(([k,v])=>{
if(k===‘className’)el.className=v;
else if(k===‘style’)Object.assign(el.style,v);
else if(k.startsWith(‘on’))el.addEventListener(k.slice(2).toLowerCase(),v);
else el.setAttribute(k,v);
});
children.flat(Infinity).forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c===‘string’||typeof c===‘number’?document.createTextNode(c):c);});
return el;
}

function SignInScreen(){
let email=’’,pass=’’;

setState({error:’’,syncing:true});

const res=await FBAuth.signIn(email,pass);
if(res.error){const m=res.error.message||’’;if(m.includes(‘EMAIL_NOT_FOUND’)||m.includes(‘INVALID_LOGIN_CREDENTIALS’))return setState({error:‘No account found.’,syncing:false});if(m.includes(‘INVALID_PASSWORD’)||m.includes(‘WRONG_PASSWORD’))return setState({error:‘Incorrect password.’,syncing:false});return setState({error:m,syncing:false});}
const profile=await FBStore.getProfile(res.idToken,res.localId);
const user={id:res.localId,name:(profile&&profile.name)||email,email,company:(profile&&profile.company)||‘My Company’,companyId:(profile&&profile.companyId)||res.localId,role:(profile&&profile.role)||‘owner’,isGuest:false,idToken:res.idToken,refreshToken:res.refreshToken};
S.set(‘pr_session’,user);
const cid=user.companyId||user.id;
const jobs=await FBStore.getJobs(res.idToken,cid);
state.jobs=jobs.length>0?jobs:(S.get(‘pr_jobs’,null)||(user.role===‘owner’?makeDemoData():[]));
S.set(‘pr_jobs’,state.jobs);
setState({screen:‘app’,user,tab:‘home’,error:’’,syncing:false});
requestNotifPermission();
if(window._syncTimer)clearInterval(window._syncTimer);
window.*syncTimer=setInterval(syncDown,15000);
}catch{
const stored=S.get(’pr_user*’+email);
if(!stored)return setState({error:‘No account found.’,syncing:false});
if(stored.pass!==pass)return setState({error:‘Incorrect password.’,syncing:false});
const user={id:uid(),name:stored.name,email,company:stored.company,companyId:stored.companyId||uid(),role:stored.role||‘owner’,isGuest:false,idToken:null};
S.set(‘pr_session’,user);state.jobs=S.get(‘pr_jobs’,null)||makeDemoData();
setState({screen:‘app’,user,tab:‘home’,error:’’,syncing:false});
}
};
return h(‘div’,{className:‘auth-wrap fade-up’},
h(‘div’,{style:{paddingTop:58,paddingBottom:24}},
h(‘button’,{className:‘auth-back’,onClick:()=>setState({screen:‘welcome’,error:’’})},‘← Back’),
h(‘div’,{className:‘auth-title’},‘Welcome back’),
h(‘div’,{className:‘auth-sub’},‘Sign in to your account.’)
),
h(‘div’,{style:{flex:1}},
AuthField(‘Email’,‘email’,‘you@company.com’,v=>email=v),
AuthField(‘Password’,‘password’,‘Your password’,v=>pass=v),
state.error&&h(‘div’,{className:‘auth-err’},‘⚠️ ‘+state.error),

)
);

}},‘👷 Join the Team’)
));

function StoriesRow(jobs,activeFilter,setFilter){

{id:‘all’,icon:‘🏗️’,label:‘All’,count:jobs.length},

{id:‘pending’,icon:‘⏳’,label:‘Pending’,count:counts.pending||0},
{id:‘invoiced’,icon:‘📄’,label:‘Invoiced’,count:counts.invoiced||0},
{id:‘paid’,icon:‘✅’,label:‘Paid’,count:counts.paid||0},
];

);

);

// Draw 3D pie chart onto a canvas element
function draw3DPie(canvas,segments,depth){
var W=canvas.width,H=canvas.height;
var ctx=canvas.getContext(‘2d’);
ctx.clearRect(0,0,W,H);
var cx=W/2, cy=H*0.42, rx=W*0.42, ry=W*0.22;
var d=depth||28;
var total2=segments.reduce(function(s,sg){return s+sg.value;},0)||1;

```
// Draw extruded sides (bottom to top for painter's algorithm)
var startAngle=-Math.PI/2;
segments.forEach(function(sg){
  var sweep=(sg.value/total2)*Math.PI*2;
  var endAngle=startAngle+sweep;
  // Only draw side if slice is in bottom half
  var a1=startAngle, a2=endAngle;
  // Draw side face
  ctx.beginPath();
  ctx.moveTo(cx+rx*Math.cos(a1), cy+ry*Math.sin(a1));
  ctx.lineTo(cx+rx*Math.cos(a1), cy+ry*Math.sin(a1)+d);
  ctx.arc(cx,cy+d,0,a1,a2); // dummy - we'll do it manually
  ctx.closePath();

  // Manual side face
  var steps=Math.max(2,Math.round(Math.abs(sweep)*20));
  ctx.beginPath();
  ctx.moveTo(cx+rx*Math.cos(a1), cy+ry*Math.sin(a1));
  for(var i=0;i<=steps;i++){
    var a=a1+(a2-a1)*(i/steps);
    ctx.lineTo(cx+rx*Math.cos(a), cy+ry*Math.sin(a));
  }
  for(var i=steps;i>=0;i--){
    var a=a1+(a2-a1)*(i/steps);
    ctx.lineTo(cx+rx*Math.cos(a), cy+ry*Math.sin(a)+d);
  }
  ctx.closePath();
  // Darken for 3D effect
  var base=sg.color;
  ctx.fillStyle=darken(base,0.55);
  ctx.fill();
  startAngle=endAngle;
});

// Draw top ellipse slices
startAngle=-Math.PI/2;
segments.forEach(function(sg){
  var sweep=(sg.value/total2)*Math.PI*2;
  var endAngle=startAngle+sweep;
  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.ellipse(cx,cy,rx,ry,0,startAngle,endAngle);
  ctx.closePath();
  ctx.fillStyle=sg.color;
  ctx.fill();
  // Subtle border
  ctx.strokeStyle='rgba(0,0,0,0.25)';
  ctx.lineWidth=1.5;
  ctx.stroke();
  startAngle=endAngle;
});

function darken(hex,factor){
var r=parseInt(hex.slice(1,3),16);
var g=parseInt(hex.slice(3,5),16);
var b=parseInt(hex.slice(5,7),16);
return ‘rgb(’+Math.round(r*factor)+’,’+Math.round(g*factor)+’,’+Math.round(b*factor)+’)’;
}

var prompt='You are analyzing a photo of a pothole for a repair company. Estimate the pothole dimensions in feet and inches. Reply ONLY with valid JSON in this exact format: {"length_ft":2.5,"width_ft":1.5,"depth_in":3,"confidence":"medium","notes":"Irregular shape, estimated from visible asphalt damage"} - Use your best judgment from the photo. If you cannot see a pothole clearly, set confidence to "low".';

fetch('https://api.anthropic.com/v1/messages',{
  method:'POST',
  headers:{
    'Content-Type':'application/json',
    'x-api-key':key,
    'anthropic-version':'2023-06-01',
    'anthropic-dangerous-direct-browser-access':'true'
  },
  body:JSON.stringify({
    model:'claude-opus-4-5',
    max_tokens:300,
    messages:[{
      role:'user',
      content:[
        {type:'image',source:{type:'base64',media_type:mtype,data:b64}},
        {type:'text',text:prompt}
      ]
    }]
  })
})
.then(function(r){return r.json();})
.then(function(data){
  if(data.error){
    window._calcAnalyzing=false;
    window._calcError='API Error: '+data.error.message;
    render();
    return;
  }
  var text=data.content&&data.content[0]&&data.content[0].text||'';
  try{
    var json=text.match(/\{[\s\S]*\}/);
    if(!json)throw new Error('No JSON found');
    var dims=JSON.parse(json[0]);
    var sqFt=dims.length_ft*dims.width_ft;
    var cuFt=sqFt*(dims.depth_in/12);
    var bags=Math.ceil(cuFt*50/25);
    var mat=bags*rates.bagCost;
    var labour=rates.labourPerHole*numHoles;
    var sub=(mat+labour)*numHoles;
    var overhead=sub*(rates.overhead/100);
    var cost=sub+overhead;
    var price=cost/(1-Math.min(rates.profit,79)/100);
    window._calcResult={
      dims:dims,
      sqFt:sqFt.toFixed(1),
      bags:bags,
      mat:mat.toFixed(2),
      labour:labour.toFixed(2),
      cost:cost.toFixed(2),
      price:price.toFixed(2),
      profit:(price-cost).toFixed(2)
    };
    window._calcAnalyzing=false;
    window._calcError='';
    render();
  }catch(e){
    window._calcAnalyzing=false;
    window._calcError='Could not read AI response. Try a clearer photo.';
    render();
  }
})
.catch(function(e){
  window._calcAnalyzing=false;
  window._calcError='Connection error. Check your API key.';
  render();
});

// RENDER
// ════════════════════════════════════════════════
function render(){
const root=document.getElementById(‘root’);root.innerHTML=’’;
let el;
if(state.screen===‘welcome’)el=WelcomeScreen();
else if(state.screen===‘signup’)el=SignUpScreen();
else if(state.screen===‘signin’)el=SignInScreen();
else if(state.screen===‘invite’)el=InviteScreen();
else el=AppShell();
root.appendChild(el);
}

window.onerror=function(msg,src,line,col,err){
document.getElementById(‘root’).innerHTML=
‘<div style="padding:40px 20px;font-family:monospace;background:#000;min-height:100vh;color:#fff">’+
‘<div style="color:#FF0000;font-size:16px;font-weight:700;margin-bottom:16px">Error on line ‘+line+’:</div>’+

‘<div style="font-size:11px;color:#444">’+src+’</div>’+
‘</div>’;
return true;
};

async function boot(){
// Apply saved theme
// Always night mode
window._isDay=false;
S.set(‘pr_theme’,‘night’);
const s=S.get(‘pr_session’);
if(s){
state.user=s;
// Load companies
await loadCompanies();
// Restore active company
const *activeCid=S.get(’pr_active_company*’+s.id,null)||s.companyId||s.id;
state.activeCompanyId=*activeCid;
// Load jobs for active company
state.jobs=S.get(’pr_jobs*’+_activeCid,S.get(‘pr_jobs’,null))||[];
state.screen=‘app’;state.tab=‘home’;render();
requestNotifPermission();
if(s.refreshToken){
try{
const res=await FBAuth.refresh(s.refreshToken);
if(res.id_token){state.user={…s,idToken:res.id_token,refreshToken:res.refresh_token};S.set(‘pr_session’,state.user);await syncDown();if(window._syncTimer)clearInterval(window._syncTimer);window._syncTimer=setInterval(syncDown,15000);}
}catch{}
}
}else{render();}
}
boot();
