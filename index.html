// ── Cold patch asphalt math (Canadian) ──────────────────────────────────────
// Cold patch density: ~1,760 kg/m³ = ~49.8 kg/ft³ → we use 50 kg/ft³
// Sold in standard 25 kg bags at Canadian hardware/supply stores
const COLD_PATCH_KG_PER_CUFT=50; // kg per cubic foot of compacted cold patch
const KG_PER_BAG=25;             // standard cold patch bag size (kg)
const RATE_DEFAULTS={
bagCostCAD:18,      // CAD$ per 25 kg bag — adjust for your supplier
laborPerPothole:85,   // CAD$ flat labour per pothole (adjust to your crew rate)
overheadPct:20,     // % of (materials+labour) — fuel, truck, tools, insurance, admin
profitPct:30,       // % profit margin on final price
};

function calcPothole(lenFt,widFt,depIn,rates=RATE_DEFAULTS){
if(!lenFt||!widFt||!depIn)return null;
const depFt=depIn/12;
const sqFt=lenFt*widFt;
const cuFt=sqFt*depFt;
const kg=cuFt*COLD_PATCH_KG_PER_CUFT;
const bags=Math.ceil(kg/KG_PER_BAG);
const mat=bags*rates.bagCostCAD;
const labor=rates.laborPerPothole; // flat rate per pothole
const sub=mat+labor;
const overhead=sub*(rates.overheadPct/100);
const totalCost=sub+overhead;
const price=totalCost/(1-Math.min(rates.profitPct,79.9)/100);
const profit=price-totalCost;
return{sqFt:sqFt.toFixed(1),cuFt:cuFt.toFixed(2),kg:Math.round(kg),bags,
mat:mat.toFixed(2),labor:labor.toFixed(2),overhead:overhead.toFixed(2),
totalCost:totalCost.toFixed(2),price:price.toFixed(2),profit:profit.toFixed(2)};
}

function getSeverity(depIn,sqFt){
const score=(depIn/6)*0.6+(sqFt/50)*0.4;
if(score<0.3)return{label:“Low”,color:”#22C55E”,desc:“Minor – routine repair”};
if(score<0.6)return{label:“Moderate”,color:”#F59E0B”,desc:“Significant – prompt repair needed”};
if(score<0.9)return{label:“High”,color:”#F97316”,desc:“Severe – priority repair required”};
return{label:“Critical”,color:”#EF4444”,desc:“Structural failure risk”};
}

const EMPTY_JOB={customerId:””,customer:””,phone:””,location:””,description:””,price:””,cost:””,status:“pending”,date:todayStr(),notes:””,photos:[]};

function JobForm({initial,onSave,customers,T}){
const [f,setF]=useState({…EMPTY_JOB,…initial,price:String(initial?.price||””),cost:String(initial?.cost||””),photos:initial?.photos||[]});
const set=k=>e=>setF(p=>({…p,[k]:e.target.value}));
const fileRef=useRef();
const profit=parseFloat(f.price||0)-parseFloat(f.cost||0);
const margin=parseFloat(f.price)>0?Math.round((profit/parseFloat(f.price))*100):0;

const selCust=cid=>{const c=customers.find(x=>x.id===cid);if(c)setF(p=>({…p,customerId:c.id,customer:c.name,phone:c.phone}));};
const addPhoto=e=>Array.from(e.target.files||[]).forEach(file=>{const r=new FileReader();r.onload=ev=>setF(p=>({…p,photos:[…(p.photos||[]),{id:uid(),data:ev.target.result,name:file.name}]}));r.readAsDataURL(file);});
const rmPhoto=pid=>setF(p=>({…p,photos:p.photos.filter(x=>x.id!==pid)}));

return(<div>
{customers.length>0&&<Sel label=“Customer” T={T} value={f.customerId} onChange={e=>selCust(e.target.value)}>
<option value="">— Select customer —</option>
{customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
</Sel>}
<Inp label=“Customer Name *” T={T} placeholder=“e.g. City of Dallas” value={f.customer} onChange={set(“customer”)}/>
<Inp label=“Phone” T={T} type=“tel” value={f.phone} onChange={set(“phone”)}/>
<Inp label=“Location / Address” T={T} value={f.location} onChange={set(“location”)}/>
<Inp label=“Description” T={T} value={f.description} onChange={set(“description”)}/>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:10,marginBottom:14}}>
<div><label style={{display:“block”,fontSize:11,fontWeight:700,color:T.text3,textTransform:“uppercase”,letterSpacing:“0.07em”,marginBottom:6}}>Price ($) *</label>
<input type=“number” value={f.price} onChange={set(“price”)} style={{width:“100%”,background:T.bg3,border:`1.5px solid ${T.border}`,borderRadius:11,padding:“12px 14px”,color:T.text,fontSize:14,outline:“none”}}/></div>
<div><label style={{display:“block”,fontSize:11,fontWeight:700,color:T.text3,textTransform:“uppercase”,letterSpacing:“0.07em”,marginBottom:6}}>Cost ($)</label>
<input type=“number” value={f.cost} onChange={set(“cost”)} style={{width:“100%”,background:T.bg3,border:`1.5px solid ${T.border}`,borderRadius:11,padding:“12px 14px”,color:T.text,fontSize:14,outline:“none”}}/></div>
</div>
{(f.price||f.cost)&&<div style={{background:profit>=0?T.greenDim:T.redDim,border:`1px solid ${profit>=0?T.green:T.red}44`,borderRadius:11,padding:“10px 14px”,marginBottom:14,display:“flex”,justifyContent:“space-between”}}>
<span style={{fontSize:13,color:T.text2}}>Profit</span>
<span style={{fontSize:14,fontWeight:700,color:profit>=0?T.green:T.red}}>{fmtFull(profit)} · {margin}% margin</span>
</div>}
<Sel label=“Status” T={T} value={f.status} onChange={set(“status”)}>{Object.entries(STATUS_META).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</Sel>
<Inp label=“Date” T={T} type=“date” value={f.date} onChange={set(“date”)}/>
{/* Photos */}
<div style={{marginBottom:14}}>
<label style={{display:“block”,fontSize:11,fontWeight:700,color:T.text3,textTransform:“uppercase”,letterSpacing:“0.07em”,marginBottom:8}}>Job Photos</label>
<input ref={fileRef} type=“file” accept=“image/*” multiple onChange={addPhoto} style={{display:“none”}}/>
{f.photos.length>0&&<div style={{display:“grid”,gridTemplateColumns:“repeat(3,1fr)”,gap:6,marginBottom:8}}>
{f.photos.map(ph=><div key={ph.id} style={{position:“relative”,aspectRatio:“1”,borderRadius:9,overflow:“hidden”,border:`1px solid ${T.border}`}}>
<img src={ph.data} alt=”” style={{width:“100%”,height:“100%”,objectFit:“cover”}}/>
<button onClick={()=>rmPhoto(ph.id)} style={{position:“absolute”,top:4,right:4,background:“rgba(0,0,0,0.7)”,border:“none”,borderRadius:“50%”,width:20,height:20,display:“flex”,alignItems:“center”,justifyContent:“center”,cursor:“pointer”}}><Ic n="x" s={11} c="#fff"/></button>
</div>)}
</div>}
<button onClick={()=>fileRef.current?.click()} style={{width:“100%”,background:T.bg3,border:`1.5px dashed ${T.border}`,borderRadius:11,padding:“11px”,cursor:“pointer”,color:T.text2,fontSize:13,fontWeight:600,display:“flex”,alignItems:“center”,justifyContent:“center”,gap:7}}>
<Ic n="camera" s={15} c={T.text2}/> Add Photos
</button>
</div>
<div style={{marginBottom:20}}>
<label style={{display:“block”,fontSize:11,fontWeight:700,color:T.text3,textTransform:“uppercase”,letterSpacing:“0.07em”,marginBottom:6}}>Notes</label>
<textarea value={f.notes} onChange={set(“notes”)} rows={3} style={{width:“100%”,background:T.bg3,border:`1.5px solid ${T.border}`,borderRadius:11,padding:“12px 14px”,color:T.text,fontSize:14,outline:“none”,resize:“none”}}/>
</div>
<Btn size=“xl” T={T} onClick={()=>{if(!f.customer||!f.price)return;onSave({…f,price:parseFloat(f.price)||0,cost:parseFloat(f.cost)||0});}}><Ic n="check" s={18} c="#fff"/>Save Job</Btn>

  </div>);
}

// DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function Dashboard({jobs,customers,estimates,timeLogs,T,isDark}){
const rev=jobs.reduce((s,j)=>s+j.price,0), cost=jobs.reduce((s,j)=>s+j.cost,0), profit=rev-cost;
const margin=rev>0?Math.round((profit/rev)*100):0;
const activeJobs=jobs.filter(j=>j.status===“pending”||j.status===“in-progress”).length;
const unpaid=jobs.filter(j=>j.status===“invoiced”).reduce((s,j)=>s+j.price,0);
const wkJobs=jobs.filter(j=>j.date>=daysAgo(7)), wkRev=wkJobs.reduce((s,j)=>s+j.price,0);

const weeks=Array.from({length:8},(_,i)=>{
const end=new Date();end.setDate(end.getDate()-(7*(7-i)));
const start=new Date(end);start.setDate(start.getDate()-6);
const s=start.toISOString().slice(0,10),e=end.toISOString().slice(0,10);
return{label:start.toLocaleDateString(“en-US”,{month:“short”,day:“numeric”}),
rev:jobs.filter(j=>j.date>=s&&j.date<=e).reduce((sum,j)=>sum+j.price,0),
profit:jobs.filter(j=>j.date>=s&&j.date<=e).reduce((sum,j)=>sum+(j.price-j.cost),0)};
});
const maxW=Math.max(…weeks.map(w=>w.rev),1);
const statCounts=Object.keys(STATUS_META).reduce((a,s)=>{a[s]=jobs.filter(j=>j.status===s).length;return a;},{});
const recent=[…jobs].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,4);
const activeTimers=timeLogs.filter(t=>t.running);

return(<div style={{padding:“0 16px 20px”}}>
{/* Hero */}
<div style={{background:`linear-gradient(135deg,${T.accent} 0%,${T.purple} 100%)`,borderRadius:20,padding:“20px”,marginBottom:16,position:“relative”,overflow:“hidden”,boxShadow:`0 8px 32px ${T.accentGlow}`}}>
<div style={{position:“absolute”,right:-20,top:-20,width:120,height:120,borderRadius:“50%”,background:“rgba(255,255,255,0.08)”}}/>
<div style={{fontSize:12,fontWeight:700,color:“rgba(255,255,255,0.7)”,textTransform:“uppercase”,letterSpacing:“0.08em”,marginBottom:4}}>Total Revenue</div>
<div style={{fontSize:44,fontWeight:800,color:”#fff”,fontFamily:”‘Familjen Grotesk’,sans-serif”,letterSpacing:”-0.03em”,lineHeight:1}}>{fmt(rev)}</div>
<div style={{display:“flex”,gap:20,marginTop:12}}>
{[[“Profit”,fmt(profit)],[“Margin”,`${margin}%`],[“Jobs”,jobs.length]].map(([l,v])=>(
<div key={l}><div style={{fontSize:11,color:“rgba(255,255,255,0.6)”}}>{l}</div><div style={{fontSize:18,fontWeight:700,color:”#fff”}}>{v}</div></div>
))}
</div>
</div>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:10,marginBottom:16}}>
<StatCard label=“This Week” value={fmt(wkRev)} sub={`${wkJobs.length} jobs`} color={T.accent} icon=“trending” T={T}/>
<StatCard label=“Active Jobs” value={activeJobs} sub={`${jobs.length} total`} color={T.yellow} icon=“hard_hat” T={T}/>
<StatCard label="Unpaid" value={fmt(unpaid)} sub="invoiced" color={T.red} icon="clock" T={T}/>
<StatCard label=“Estimates” value={estimates.length} sub={`${estimates.filter(e=>e.status==="sent").length} pending`} color={T.purple} icon=“estimates” T={T}/>
</div>
{activeTimers.length>0&&<div style={{background:T.greenDim,border:`1px solid ${T.green}44`,borderRadius:14,padding:“12px 16px”,marginBottom:16,display:“flex”,alignItems:“center”,gap:12}}>
<div style={{width:10,height:10,borderRadius:“50%”,background:T.green}} className=“pulse”/>
<div><div style={{fontSize:13,fontWeight:700,color:T.green}}>{activeTimers.length} timer{activeTimers.length>1?“s”:””} running</div></div>
</div>}
{/* Chart */}
<div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:18,padding:18,marginBottom:16}}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,marginBottom:14}}>
<div style={{fontSize:14,fontWeight:700,color:T.text}}>Revenue vs Profit</div>
<div style={{display:“flex”,gap:12}}>
{[[T.accent,“Revenue”],[T.green,“Profit”]].map(([c,l])=><div key={l} style={{display:“flex”,alignItems:“center”,gap:5}}><div style={{width:8,height:8,borderRadius:2,background:c}}/><span style={{fontSize:11,color:T.text3}}>{l}</span></div>)}
</div>
</div>
<div style={{display:“flex”,alignItems:“flex-end”,gap:5,height:90}}>
{weeks.map((w,i)=><div key={i} style={{flex:1,display:“flex”,alignItems:“flex-end”,gap:2,height:“100%”}}>
<div style={{flex:1,background:w.rev>0?T.accent:T.bg3,borderRadius:“3px 3px 0 0”,height:`${Math.max((w.rev/maxW)*85,w.rev>0?6:2)}px`,transition:“height 0.5s ease”}}/>
<div style={{flex:1,background:w.profit>0?T.green:T.bg3,borderRadius:“3px 3px 0 0”,height:`${Math.max((w.profit/maxW)*85,w.profit>0?4:2)}px`,transition:“height 0.5s ease”}}/>
</div>)}
</div>
</div>
{/* Status breakdown */}
<div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:18,padding:18,marginBottom:16}}>
<div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:14}}>Job Status Overview</div>
{Object.entries(STATUS_META).map(([key,meta])=>{
const cnt=statCounts[key]||0; if(!cnt)return null;
const pct=Math.round((cnt/(jobs.length||1))*100);
return(<div key={key} style={{marginBottom:10}}>
<div style={{display:“flex”,justifyContent:“space-between”,marginBottom:4}}>
<div style={{display:“flex”,alignItems:“center”,gap:7}}><div style={{width:8,height:8,borderRadius:2,background:meta.dot}}/><span style={{fontSize:13,color:T.text2}}>{meta.label}</span></div>
<span style={{fontSize:13,fontWeight:700,color:T.text}}>{cnt} · {pct}%</span>
</div>
<div style={{background:T.bg3,borderRadius:4,height:5,overflow:“hidden”}}><div style={{background:meta.dot,height:“100%”,width:`${pct}%`,borderRadius:4,transition:“width 0.6s ease”}}/></div>
</div>);
}).filter(Boolean)}
</div>
{/* Recent */}
{recent.length>0&&<div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:18,padding:18}}>
<div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:14}}>Recent Jobs</div>
{recent.map((job,i)=><div key={job.id} style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,padding:“10px 0”,borderBottom:i<recent.length-1?`1px solid ${T.border}`:“none”}}>
<div style={{flex:1,minWidth:0,marginRight:10}}>
<div style={{fontSize:14,fontWeight:600,color:T.text,overflow:“hidden”,textOverflow:“ellipsis”,whiteSpace:“nowrap”}}>{job.customer}</div>
<div style={{fontSize:12,color:T.text3,marginTop:1}}>{job.description||job.location||”—”}</div>
</div>
<div style={{textAlign:“right”,flexShrink:0}}>
<div style={{fontSize:15,fontWeight:700,color:T.green,marginBottom:3}}>{fmt(job.price)}</div>
<Badge status={job.status} isDark={isDark}/>
</div>
</div>)}
</div>}

  </div>);
}

function WorkerRestricted({T}){

<div style={{display:“flex”,flexDirection:“column”,alignItems:“center”,justifyContent:“center”,padding:“80px 32px”,textAlign:“center”}}>
<div style={{fontSize:56,marginBottom:16}}>🔒</div>

function JobsScreen({jobs,customers,onEdit,onDelete,onInvoice,T,isDark}){
const [search,setSearch]=useState(””),[filter,setFilter]=useState(“all”);
const [sort,setSort]=useState(“date-desc”),[expandId,setExpandId]=useState(null);
const fil=jobs.filter(j=>filter===“all”||j.status===filter)
.filter(j=>{const q=search.toLowerCase();return!q||[j.customer,j.location,j.description].some(s=>(s||””).toLowerCase().includes(q));})
.sort((a,b)=>sort===“date-desc”?new Date(b.date)-new Date(a.date):sort===“date-asc”?new Date(a.date)-new Date(b.date):sort===“price-desc”?b.price-a.price:(b.price-b.cost)-(a.price-a.cost));
return(<div style={{padding:“0 16px”}}>
<div style={{position:“relative”,marginBottom:10}}>
<div style={{position:“absolute”,left:13,top:“50%”,transform:“translateY(-50%)”,pointerEvents:“none”}}><Ic n="search" s={16} c={T.text3}/></div>
<input value={search} onChange={e=>setSearch(e.target.value)} placeholder=“Search jobs…” style={{width:“100%”,background:T.bg2,border:`1.5px solid ${T.border}`,borderRadius:13,padding:“11px 12px 11px 40px”,color:T.text,fontSize:14,outline:“none”}}/>
</div>
<div style={{display:“flex”,gap:7,marginBottom:10,overflowX:“auto”,paddingBottom:4}}>
{[“all”,…Object.keys(STATUS_META)].map(s=><button key={s} onClick={()=>setFilter(s)} style={{background:filter===s?T.accent:T.bg2,border:`1.5px solid ${filter===s?T.accent:T.border}`,borderRadius:20,padding:“6px 14px”,fontSize:12,fontWeight:700,color:filter===s?”#fff”:T.text3,cursor:“pointer”,whiteSpace:“nowrap”}}>{s===“all”?“All”:STATUS_META[s]?.label}</button>)}
</div>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,marginBottom:12}}>
<span style={{fontSize:12,color:T.text3}}>{fil.length} jobs · {fmt(fil.reduce((s,j)=>s+j.price,0))}</span>
<select value={sort} onChange={e=>setSort(e.target.value)} style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:8,padding:“5px 10px”,color:T.text2,fontSize:12,outline:“none”,cursor:“pointer”}}>
<option value="date-desc">Newest</option><option value="date-asc">Oldest</option>
<option value="price-desc">Highest Price</option><option value="profit-desc">Most Profitable</option>
</select>
</div>
{fil.length===0?<div style={{textAlign:“center”,padding:“60px 20px”}}><div style={{fontSize:36,marginBottom:10}}>🔍</div><div style={{fontSize:15,color:T.text2}}>No jobs found</div></div>
:fil.map(job=>{
const profit=job.price-job.cost, margin=job.price>0?Math.round((profit/job.price)*100):0, isOpen=expandId===job.id;
return(<div key={job.id} style={{background:T.bg2,border:`1.5px solid ${isOpen?T.accent:T.border}`,borderRadius:16,marginBottom:10,overflow:“hidden”,transition:“border-color 0.2s”}}>
<div onClick={()=>setExpandId(isOpen?null:job.id)} style={{padding:“14px 16px”,cursor:“pointer”}}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“flex-start”,marginBottom:8}}>
<div style={{flex:1,marginRight:10}}>
<div style={{fontSize:16,fontWeight:700,color:T.text,fontFamily:”‘Familjen Grotesk’,sans-serif”}}>{job.customer}</div>
{job.location&&<div style={{fontSize:12,color:T.text3,marginTop:2,display:“flex”,alignItems:“center”,gap:4}}><Ic n="map" s={11} c={T.text3}/>{job.location}</div>}
</div>
<Badge status={job.status} isDark={isDark}/>
</div>
{job.description&&<div style={{fontSize:13,color:T.text2,marginBottom:10}}>{job.description}</div>}
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr 1fr”,gap:6}}>
{[{l:“Revenue”,v:fmt(job.price),c:T.green},{l:“Cost”,v:fmt(job.cost),c:T.red},{l:“Profit”,v:fmt(profit),c:margin>=25?T.green:margin>=0?T.yellow:T.red}].map(s=>(
<div key={s.l} style={{background:T.bg3,borderRadius:9,padding:“8px 10px”}}><div style={{fontSize:10,color:T.text3,fontWeight:700,marginBottom:2}}>{s.l}</div><div style={{fontSize:14,fontWeight:700,color:s.c}}>{s.v}</div></div>
))}
</div>
<div style={{display:“flex”,justifyContent:“space-between”,marginTop:8}}>
<span style={{fontSize:12,color:T.text3}}>{fmtShort(job.date)}</span>
<div style={{display:“flex”,gap:8}}>
{job.photos?.length>0&&<span style={{fontSize:11,color:T.text3,display:“flex”,alignItems:“center”,gap:3}}><Ic n="camera" s={11} c={T.text3}/>{job.photos.length}</span>}
<span style={{fontSize:12,color:margin>=25?T.green:T.text3,fontWeight:700}}>{margin}% margin</span>
</div>
</div>
</div>
{isOpen&&<div style={{borderTop:`1px solid ${T.border}`,padding:“10px 14px”}}>
{job.photos?.length>0&&<div style={{display:“grid”,gridTemplateColumns:“repeat(4,1fr)”,gap:6,marginBottom:10}}>
{job.photos.map(ph=><img key={ph.id} src={ph.data} alt=”” style={{width:“100%”,aspectRatio:“1”,objectFit:“cover”,borderRadius:8,border:`1px solid ${T.border}`}}/>)}
</div>}
{job.notes&&<div style={{fontSize:13,color:T.text2,background:T.bg3,borderRadius:9,padding:“8px 12px”,marginBottom:10,fontStyle:“italic”}}>{job.notes}</div>}
<div style={{display:“flex”,gap:8}}>
<Btn variant=“outline” size=“sm” T={T} onClick={()=>onInvoice&&onInvoice(job)}><Ic n="invoice" s={13} c={T.accent}/>Invoice</Btn>
<Btn variant=“secondary” size=“sm” T={T} onClick={()=>onEdit&&onEdit(job)}><Ic n="edit" s={13} c={T.text2}/>Edit</Btn>
<Btn variant=“danger” size=“sm” T={T} onClick={()=>onDelete&&onDelete(job.id)}><Ic n="trash" s={13} c={T.red}/></Btn>

// ── FIRESTORE helpers (REST API) ───────────────────────────────────────────
// Converts a plain JS object to Firestore field-value format
function toFS(obj) {
const fields = {};
for (const [k, v] of Object.entries(obj)) {
if (v === null || v === undefined) fields[k] = { nullValue: null };
else if (typeof v === “boolean”)   fields[k] = { booleanValue: v };
else if (typeof v === “number”)    fields[k] = { doubleValue: v };
else if (typeof v === “string”)    fields[k] = { stringValue: v };
else if (Array.isArray(v))         fields[k] = { arrayValue: { values: v.map(i => typeof i === “string” ? { stringValue: i } : { doubleValue: i }) } };
else if (typeof v === “object”)    fields[k] = { mapValue: { fields: toFS(v).fields || {} } };
}
return { fields };
}

// Converts Firestore field-value format back to plain JS
function fromFS(doc) {
if (!doc?.fields) return null;
const obj = {};
for (const [k, v] of Object.entries(doc.fields)) {
if (“stringValue”  in v) obj[k] = v.stringValue;
else if (“doubleValue”  in v) obj[k] = v.doubleValue;
else if (“integerValue” in v) obj[k] = parseInt(v.integerValue);
else if (“booleanValue” in v) obj[k] = v.booleanValue;
else if (“nullValue”    in v) obj[k] = null;
else if (“arrayValue”   in v) obj[k] = (v.arrayValue.values || []).map(i => i.stringValue ?? i.doubleValue ?? i.integerValue ?? null);
else if (“mapValue”     in v) obj[k] = fromFS(v.mapValue);
}
return obj;
}

const FBStore = {
// Get all docs in a user’s subcollection
async getAll(idToken, userId, collection) {
try {
const r = await fetch(`${FB_FS_URL}/users/${userId}/${collection}`, {
headers: { Authorization: `Bearer ${idToken}` },
});
const data = await r.json();
if (!data.documents) return [];
return data.documents.map(doc => ({
id: doc.name.split(”/”).pop(),
…fromFS(doc),
}));
} catch { return []; }
},

// Set (create or overwrite) a single doc
async set(idToken, userId, collection, docId, data) {
try {
const { id, photos, …rest } = data; // strip photos (too large for Firestore)
const r = await fetch(`${FB_FS_URL}/users/${userId}/${collection}/${docId}`, {
method: “PATCH”,
headers: { Authorization: `Bearer ${idToken}`, “Content-Type”: “application/json” },
body: JSON.stringify(toFS({ …rest, id: docId })),
});
return r.ok;
} catch { return false; }
},

// Delete a single doc
async delete(idToken, userId, collection, docId) {
try {
await fetch(`${FB_FS_URL}/users/${userId}/${collection}/${docId}`, {
method: “DELETE”,
headers: { Authorization: `Bearer ${idToken}` },
});
} catch {}
},

// Set user profile doc

headers: { Authorization: `Bearer ${idToken}`, “Content-Type”: “application/json” },
body: JSON.stringify(toFS(profile)),
});
return r.ok;
} catch { return false; }
},

function SignUpScreen({ onBack, onSuccess, T }) {
const [step, setStep]       = useState(1);
const [name, setName]       = useState(””);
const [email, setEmail]     = useState(””);
const [password, setPass]   = useState(””);

const [company, setCompany] = useState(””);
const [loading, setLoading] = useState(false);
const [error, setError]     = useState(””);
const [useFirebase, setUseFirebase] = useState(false);

const stepLabels = [“Your Info”, “Your Company”];

const nextStep = () => {
setError(””);
if (step === 1) {
if (!name.trim())                          return setError(“Please enter your name.”);
if (!email.trim() || !email.includes(”@”)) return setError(“Please enter a valid email.”);
if (password.length < 6)                   return setError(“Password must be at least 6 characters.”);
if (password !== confirm)                   return setError(“Passwords don’t match.”);
setStep(2);
}
};

const createLocalAccount = () => {
if (!company.trim()) return setError(“Please enter your company name.”);
const companyId = uid();
const userData = { id: uid(), email, name, role: “owner”, company, companyId, isGuest: false, isLocal: true, idToken: “local”, refreshToken: “local” };
stor(“fo4_local_users_” + email, JSON.stringify({ email, password, name, role: “owner”, company, companyId }));
onSuccess(userData);
};

const createFirebaseAccount = async () => {
if (!company.trim()) return setError(“Please enter your company name.”);
setLoading(true); setError(””);
try {
const res = await FBAuth.signUp(email, password);
if (res.error) {
const msg = res.error.message || “”;
if (msg.includes(“EMAIL_EXISTS”))         return setError(“Email already registered. Try signing in.”);
if (msg.includes(“OPERATION_NOT_ALLOWED”) || msg.includes(“ADMIN_ONLY_OPERATION”)) return setError(“Enable Email/Password in Firebase Console → Authentication → Sign-in method.”);
return setError(`Firebase: ${msg}`);
}
const companyId = res.localId;
await FBStore.setProfile(res.idToken, res.localId, { name, role: “owner”, company, companyId, email });
onSuccess({ id: res.localId, email, name, role: “owner”, company, companyId, isGuest: false, isLocal: false, idToken: res.idToken, refreshToken: res.refreshToken });
} catch (e) {
setError(“Can’t reach Firebase. Use local mode below.”);
} finally { setLoading(false); }
};

return (

// SIGN IN
// ═══════════════════════════════════════════════════════════════════════════════
function SignInScreen({ onBack, onSuccess, onForgot, T }) {
const [email, setEmail]       = useState(””);
const [password, setPass]     = useState(””);
const [loading, setLoading]   = useState(false);
const [error, setError]       = useState(””);
const [useFirebase, setUseFB] = useState(false);

const handleSignIn = async () => {
if (!email.trim() || !password) return setError(“Please enter your email and password.”);
setLoading(true); setError(””);
if (!useFirebase) {
try {
const stored = load(“fo4_local_users_” + email, null);
if (!stored) return setError(“No account found for that email. Please sign up first.”);
const creds = typeof stored === “string” ? JSON.parse(stored) : stored;
if (creds.password !== password) return setError(“Incorrect password. Please try again.”);
onSuccess({ id: uid(), email: creds.email, name: creds.name, role: creds.role, company: creds.company, companyId: creds.companyId, isGuest: false, isLocal: true, idToken: “local”, refreshToken: “local” });
} catch { setError(“Sign in failed. Try signing up again.”); }
finally { setLoading(false); }
return;
}
try {
const res = await FBAuth.signIn(email, password);
if (res.error) {
const msg = res.error.message || “”;
if (msg.includes(“EMAIL_NOT_FOUND”) || msg.includes(“INVALID_LOGIN_CREDENTIALS”)) return setError(“No account found with that email.”);
if (msg.includes(“INVALID_PASSWORD”) || msg.includes(“WRONG_PASSWORD”))           return setError(“Incorrect password.”);
if (msg.includes(“TOO_MANY_ATTEMPTS”)) return setError(“Too many attempts. Wait a few minutes.”);
return setError(`Firebase: ${msg}`);
}
const profile = await FBStore.getProfile(res.idToken, res.localId);
onSuccess({ id: res.localId, email: res.email, name: profile?.name || res.email, role: profile?.role || “owner”, company: profile?.company || “Premium.Repairs”, companyId: profile?.companyId, isGuest: false, isLocal: false, idToken: res.idToken, refreshToken: res.refreshToken });
} catch { setError(“Can’t reach Firebase. Switch to Local mode.”); }
finally { setLoading(false); }
};

return (
<div style={{ minHeight: “100vh”, background: T.bg, display: “flex”, flexDirection: “column” }}>
<style>{AUTH_CSS}</style>
<div style={{ padding: “54px 20px 24px”, display: “flex”, alignItems: “center”, gap: 12 }}>

<div style={{ fontSize: 22, fontWeight: 800, color: T.text, fontFamily: “‘Familjen Grotesk’, sans-serif” }}>Welcome Back</div>
</div>

{[{fb:false,icon:“📱”,label:“Local Mode”},{fb:true,icon:“🔥”,label:“Firebase”}].map(m=>(
<button key={String(m.fb)} onClick={() => { setUseFB(m.fb); setError(””); }} style={{ padding: “11px”, borderRadius: 11, border: `2px solid ${useFirebase===m.fb?T.accent:T.border}`, background: useFirebase===m.fb?T.accentDim:T.bg2, cursor: “pointer”, display: “flex”, alignItems: “center”, justifyContent: “center”, gap: 7 }}>
<span style={{ fontSize: 16 }}>{m.icon}</span>
<span style={{ fontSize: 13, fontWeight: 700, color: useFirebase===m.fb?T.accent:T.text2 }}>{m.label}</span>
</button>

<AuthInput label=“Password” type=“password” placeholder=“Your password” value={password} onChange={e => setPass(e.target.value)} T={T} />

<button onClick={handleSignIn} disabled={loading} style={{ width: “100%”, background: loading ? T.bg3 : `linear-gradient(135deg, ${T.accent}, ${T.purple})`, border: “none”, borderRadius: 13, padding: “15px”, fontSize: 15, fontWeight: 800, color: loading ? T.text3 : “#fff”, cursor: loading ? “default” : “pointer”, fontFamily: “‘Familjen Grotesk’, sans-serif”, display: “flex”, alignItems: “center”, justifyContent: “center”, gap: 8 }}>

      : tab === "estimates" ? (isManager?<EstimatesScreen estimates={estimates} customers={customers} onSave={saveEst} onDelete={isOwner?deleteEst:null} T={T}/>:<WorkerRestricted T={T}/>)
      : tab === "analyzer"  ? (isManager?<PotholeAnalyzer T={T} isDark={isDark} onSendToJob={sendToJob}/>:<WorkerRestricted T={T}/>)
      : tab === "analytics" ? (isOwner?<AnalyticsScreen jobs={jobs} customers={customers} T={T}/>:<WorkerRestricted T={T}/>)
      : tab === "time"      ? <TimeScreen timeLogs={timeLogs} setTimeLogs={setTimeP} jobs={visibleJobs} T={T}/>
      : null}
  </div>

  </div>

  {/* Bottom Nav */}
  <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: T.navBg, borderTop: `1px solid ${T.border}`, display: "flex", padding: "6px 0 22px", zIndex: 200, boxShadow: `0 -4px 24px ${T.shadow}`, transition: "background 0.3s" }}>
    {BOTTOM_TABS.map(t => {
      const active = tab === t.id;
      const isAnalyzer = t.id === "analyzer";
      const activeColor = isAnalyzer ? T.orange : T.accent;
      const activeDim   = isAnalyzer ? T.orangeDim : T.accentDim;
      return (
        <button key={t.id} onClick={() => goTab(t.id)} style={{ flex: 1, background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "6px 0" }}>
          <div style={{ width: 36, height: 36, borderRadius: 12, background: active ? activeDim : "transparent", display: "flex", alignItems: "center", justifyContent: "center", transition: "background 0.2s" }}>
            <Ic n={t.icon} s={20} c={active ? activeColor : T.text3} />
          </div>
          <span style={{ fontSize: 10, fontWeight: 700, color: active ? activeColor : T.text3, textTransform: "uppercase", letterSpacing: "0.06em" }}>{t.label}</span>
        </button>
      );
    })}

    <div style={{ width: 1, background: T.border, margin: "10px 0 8px" }} />

    {/* ☰ More */}
    <button onClick={() => setSidebarOpen(true)} style={{ flex: 1, background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "6px 0", position: "relative" }}>
      <div style={{ width: 36, height: 36, borderRadius: 12, background: isSideActive ? T.accentDim : "transparent", display: "flex", alignItems: "center", justifyContent: "center", transition: "background 0.2s" }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 4, alignItems: "center" }}>
          <div style={{ width: 18, height: 2, borderRadius: 2, background: isSideActive ? T.accent : T.text3 }} />
          <div style={{ width: 13, height: 2, borderRadius: 2, background: isSideActive ? T.accent : T.text3 }} />
          <div style={{ width: 18, height: 2, borderRadius: 2, background: isSideActive ? T.accent : T.text3 }} />
        </div>
      </div>
      <span style={{ fontSize: 10, fontWeight: 700, color: isSideActive ? T.accent : T.text3, textTransform: "uppercase", letterSpacing: "0.06em" }}>More</span>
      {isSideActive && <div style={{ position: "absolute", top: 5, right: "calc(50% - 14px)", width: 7, height: 7, borderRadius: "50%", background: T.accent, border: `2px solid ${T.navBg}` }} />}
    </button>
  </div>
</div>

{/* Sidebar Drawer */}
{sidebarOpen && (
  <div className="fi" style={{ position: "fixed", inset: 0, zIndex: 500 }}>
    <div onClick={() => setSidebarOpen(false)} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.55)", backdropFilter: "blur(5px)" }} />
    <div className="su" style={{ position: "absolute", top: 0, right: 0, bottom: 0, width: "78%", maxWidth: 300, background: T.bg2, borderLeft: `1px solid ${T.border}`, display: "flex", flexDirection: "column", boxShadow: `-16px 0 48px ${T.shadow}` }}>

      <div style={{ padding: "54px 20px 16px", borderBottom: `1px solid ${T.border}` }}>
        <UserProfileCard user={user} onSignOut={handleSignOut} T={T} />
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "14px 12px" }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: T.text3, textTransform: "uppercase", letterSpacing: "0.1em", padding: "0 10px", marginBottom: 8 }}>More Screens</div>
        {SIDE_TABS.map(t => {
          const active = tab === t.id;
          return (
            <button key={t.id} onClick={() => goTab(t.id)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "12px 10px", borderRadius: 14, background: active ? T.accentDim : "transparent", border: `1px solid ${active ? T.accent + "55" : "transparent"}`, cursor: "pointer", marginBottom: 4, transition: "all 0.15s", textAlign: "left" }}>
              <div style={{ width: 42, height: 42, borderRadius: 13, background: active ? T.accent : T.bg3, border: `1px solid ${active ? T.accent : T.border}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.15s" }}>
                <Ic n={t.icon} s={20} c={active ? "#fff" : T.text2} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: active ? T.accent : T.text, fontFamily: "'Familjen Grotesk', sans-serif" }}>{t.label}</div>
                <div style={{ fontSize: 12, color: T.text3, marginTop: 2 }}>{t.desc}</div>
              </div>
              {active && <div style={{ width: 6, height: 6, borderRadius: "50%", background: T.accent, flexShrink: 0 }} />}
            </button>
          );
        })}

        <div style={{ height: 1, background: T.border, margin: "14px 10px" }} />
        <div style={{ fontSize: 10, fontWeight: 700, color: T.text3, textTransform: "uppercase", letterSpacing: "0.1em", padding: "0 10px", marginBottom: 8 }}>Preferences</div>
        <button onClick={toggleTheme} style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "12px 10px", borderRadius: 14, background: "transparent", border: "1px solid transparent", cursor: "pointer", marginBottom: 4, textAlign: "left" }}>
          <div style={{ width: 42, height: 42, borderRadius: 13, background: T.bg3, border: `1px solid ${T.border}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <Ic n={isDark ? "sun" : "moon"} s={20} c={T.text2} />
          </div>
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: T.text, fontFamily: "'Familjen Grotesk', sans-serif" }}>{isDark ? "Switch to Light" : "Switch to Dark"}</div>
            <div style={{ fontSize: 12, color: T.text3, marginTop: 2 }}>Change appearance</div>
          </div>
        </button>

        {/* Invite Workers — owners only */}
        {isOwner && <InvitePanel T={T} user={user} company={company}/>}


        {/* Firebase sync status */}
        {!user?.isGuest && (
          <div style={{ margin: "14px 10px 0", background: T.bg3, borderRadius: 12, padding: "12px 14px" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: T.text3, textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 6 }}>🔥 Firebase Sync</div>
            <div style={{ fontSize: 12, color: syncing ? T.accent : T.green, display: "flex", alignItems: "center", gap: 6 }}>
              <div style={{ width: 7, height: 7, borderRadius: "50%", background: syncing ? T.accent : T.green, animation: syncing ? "pulse 1s infinite" : "none" }} />
              {syncing ? "Syncing…" : "All data synced"}
            </div>
            <div style={{ fontSize: 11, color: T.text3, marginTop: 4 }}>pothole-6b684.firebaseapp.com</div>
          </div>
        )}
      </div>

      <div style={{ padding: "14px 20px 40px", borderTop: `1px solid ${T.border}` }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: T.text, fontFamily: "'Familjen Grotesk', sans-serif", marginBottom: 2 }}>Premium.Repairs</div>
        <div style={{ fontSize: 11, color: T.text3 }}>Pothole & Asphalt Repair · v4.0</div>
      </div>
    </div>
  </div>
)}

{showJobForm && (
  <Sheet title={editJob ? "Edit Job" : "New Job"} onClose={() => { setShowJobForm(false); setEditJob(null); setPrefillJob(null); }} T={T}>
    <JobForm initial={editJob || prefillJob || undefined} onSave={saveJob} customers={customers} T={T} />
  </Sheet>
)}

{invoiceJob && <InvoiceSheet job={invoiceJob} company={company} T={T} onClose={() => setInvoiceJob(null)} />}
```

</>);
}

ReactDOM.createRoot(document.getElementById(‘root’)).render(
React.createElement(App)
);
</script>
